apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-resources
spec:
  project: kargo-addons
  source:
    repoURL: https://github.com/34fathombelow/kargo-helm-prom-stack.git
    path: kargo-resources
    directory:
      recurse: true
      include: '*.yaml'
  destination:
    name: kargo1
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true