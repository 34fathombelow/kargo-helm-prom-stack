apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: kube-prometheus-stack
  repo: https://prometheus-community.github.io/helm-charts
  version: 85.3.0
  releaseName: kube-prometheus-stack
  includeCRDs: true
  namespace: monitoring
  valuesFile: values.yaml

resources:
  - ../../extras
