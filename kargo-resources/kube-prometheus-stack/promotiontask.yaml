apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: default-promote
  namespace: kargo-helm-prom-stack
spec:
  vars:
  - name: gitRepo
  - name: chartName
  - name: chartRepo
  - name: helmSrc # path to the stage config dir inside ./src, e.g. ./src/addons/kube-prometheus-stack/stage/dev
  - name: targetBranch # stage branch Kargo writes rendered manifests to, e.g. addon/kube-prometheus.stack/stage/dev
  steps:
  # Two workspaces: ./src = main (version config), ./out = stage branch (rendered manifests)
  # create: true ensures the stage branch is initialized on first promotion if it doesn't exist yet
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src
      - branch: ${{ vars.targetBranch }}
        create: true
        path: ./out
  # Wipe ./out before rendering so stale files from prior promotions don't persist in the stage branch
  - uses: git-clear
    config:
      path: ./out
  # Bump the chart version in kustomization.yaml
  - uses: yaml-update
    as: update-kustomize
    config:
      path: ${{ vars.helmSrc }}/kustomization.yaml
      updates:
      - key: helmCharts.0.version
        value: ${{ chartFrom(vars.chartRepo, vars.chartName, warehouse(vars.chartName)).Version }}
  # Bump image tags in values.yaml
  - uses: yaml-update
    as: update-images
    config:
      path: ${{ vars.helmSrc }}/values.yaml
      updates:
      - key: grafana.image.tag
        value: ${{ imageFrom("docker.io/grafana/grafana", warehouse("non-operator-images")).Tag }}
      - key: alertmanager.alertmanagerSpec.image.tag
        value: ${{ imageFrom("quay.io/prometheus/alertmanager", warehouse("non-operator-images")).Tag }}
      - key: prometheus.prometheusSpec.image.tag
        value: ${{ imageFrom("quay.io/prometheus/prometheus", warehouse("non-operator-images")).Tag }}
  # Render the Helm chart + extras into a single manifest that ArgoCD will sync from the stage branch
  - uses: kustomize-build
    config:
      path: ${{ vars.helmSrc }}
      outPath: ./out/manifest.yaml
  # Commit version bumps to main
  - uses: git-commit
    as: image-update
    config:
      path: ./src
      message: |
        ${{ task.outputs['update-images'].commitMessage }}
        ${{ task.outputs['update-kustomize'].commitMessage }}
  # Commit rendered manifests to the stage branch — ArgoCD syncs from here
  - uses: git-commit
    as: commit
    config:
      path: ./out
      message: rendered updated manifests
  # Push image & kustomize changes to the Git repository.
  - uses: git-push
    config:
      path: ./src
  # Push the rendered manifest to git
  - uses: git-push
    config:
      path: ./out
  # Update Argo CD application
  - uses: argocd-update
    retry:
      errorThreshold: 1
    config:
      apps:
      - name: ${{ vars.chartName }}-${{ ctx.stage }}
        sources:
        - repoURL: ${{ vars.gitRepo }}
