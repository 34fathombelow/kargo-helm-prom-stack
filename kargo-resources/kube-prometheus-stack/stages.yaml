apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-helm-prom-stack
  annotations:
    kargo.akuity.io/color: red
    argocd.argoproj.io/sync-wave: "2"
spec:
  shard: dev
  requestedFreight:
  - origin:
      kind: Warehouse
      name: kube-prometheus-stack
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: non-operator-images
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: addon-extras
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - task:
          name: default-promote
        as: promotion
      vars:
      - name: gitRepo
        value: https://github.com/34fathombelow/kargo-helm-prom-stack.git
      - name: chartName
        value: kube-prometheus-stack
      - name: chartRepo
        value: https://prometheus-community.github.io/helm-charts
      - name: helmSrc
        value: ./src/addons/kube-prometheus-stack/stage/${{ ctx.stage }}
      - name: targetBranch
        value: addon/kube-prometheus.stack/stage/${{ ctx.stage }}

  verification:
    analysisTemplates:
    - name: prometheus-is-up

